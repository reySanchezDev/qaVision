<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
    <defs>
        <!-- Background Gradient -->
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1E293B"/> <!-- Slate 800 -->
            <stop offset="100%" stop-color="#0F172A"/> <!-- Slate 900 -->
        </linearGradient>

        <!-- Blade Metallic Gradient -->
        <linearGradient id="blade" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#F1F5F9"/> <!-- Slate 100 -->
            <stop offset="100%" stop-color="#94A3B8"/> <!-- Slate 400 -->
        </linearGradient>

        <!-- Cyan Accent (Handles and Border) -->
        <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#38BDF8"/> <!-- Sky 400 -->
            <stop offset="100%" stop-color="#2563EB"/> <!-- Blue 600 -->
        </linearGradient>

        <!-- Soft Drop Shadow for Depth -->
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="6" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity="0.4"/>
        </filter>
        
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="8" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <!-- Base Squircle Shape (App Icon) -->
    <rect width="512" height="512" rx="116" fill="url(#bg)"/>
    <rect x="4" y="4" width="504" height="504" rx="112" stroke="#ffffff" stroke-opacity="0.08" stroke-width="8"/>

    <!-- Dashed Region (The cutting target area) -->
    <rect x="110" y="110" width="292" height="292" rx="32" stroke="url(#accent)" stroke-width="12" stroke-dasharray="24 24" stroke-linecap="round" fill="none" opacity="0.6" filter="url(#glow)"/>

    <!-- Scissors Group -->
    <g filter="url(#shadow)">
        <!-- Bottom Blade & Handle -->
        <g transform="translate(256 256) rotate(-15) translate(-256 -256)">
            <!-- Blade -->
            <path d="M 220 256 L 410 330 Q 420 310 400 300 L 256 244 Z" fill="url(#blade)"/>
            <!-- Handle -->
            <path d="M 256 256 L 150 156 C 110 136 120 70 170 80 C 210 90 220 140 230 180 L 256 256 Z" fill="url(#accent)"/>
            <!-- Finger Hole -->
            <circle cx="168" cy="116" r="26" fill="url(#bg)"/>
            <!-- Finger Hole Border (Inner) -->
            <circle cx="168" cy="116" r="26" stroke="#1E293B" stroke-width="4"/>
        </g>

        <!-- Top Blade & Handle -->
        <g transform="translate(256 256) rotate(15) translate(-256 -256)">
            <!-- Blade -->
            <path d="M 220 256 L 410 182 Q 420 202 400 212 L 256 268 Z" fill="url(#blade)"/>
            <!-- Handle -->
            <path d="M 256 256 L 150 356 C 110 376 120 442 170 432 C 210 422 220 372 230 332 L 256 256 Z" fill="url(#accent)"/>
            <!-- Finger Hole -->
            <circle cx="168" cy="396" r="26" fill="url(#bg)"/>
            <!-- Finger Hole Border (Inner) -->
            <circle cx="168" cy="396" r="26" stroke="#0F172A" stroke-width="4"/>
        </g>

        <!-- Central Metallic Pivot / Screw -->
        <circle cx="256" cy="256" r="14" fill="#334155"/>
        <circle cx="256" cy="256" r="6" fill="#0F172A"/>
    </g>
</svg>
